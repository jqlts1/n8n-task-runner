version: "3.9"

x-n8n-common-env: &n8n-common-env
  TZ: Asia/Shanghai
  GENERIC_TIMEZONE: Asia/Shanghai

  N8N_PROTOCOL: http
  N8N_HOST: 10.10.10.4
  N8N_PORT: 5678
  WEBHOOK_URL: http://10.10.10.4:5677/

  N8N_ENCRYPTION_KEY: your-very-long-random-key
  N8N_SECURE_COOKIE: false
  N8N_DEFAULT_BINARY_DATA_MODE: filesystem

  DB_TYPE: postgresdb
  DB_POSTGRESDB_HOST: postgres
  DB_POSTGRESDB_PORT: 5432
  DB_POSTGRESDB_DATABASE: n8n
  DB_POSTGRESDB_USER: n8n
  DB_POSTGRESDB_PASSWORD: your-db-password

  EXECUTIONS_MODE: queue
  QUEUE_BULL_REDIS_HOST: redis
  QUEUE_BULL_REDIS_PORT: 6379
  QUEUE_BULL_REDIS_DB: 0
  QUEUE_BULL_PREFIX: n8n

  OFFLOAD_MANUAL_EXECUTIONS_TO_WORKERS: true
  N8N_DISABLE_PRODUCTION_MAIN_PROCESS: true

  EXECUTIONS_DATA_PRUNE: true
  EXECUTIONS_DATA_MAX_AGE: 168
  EXECUTIONS_DATA_PRUNE_MAX_COUNT: 50000

  N8N_LOG_LEVEL: info

  N8N_RUNNERS_ENABLED: true
  N8N_RUNNERS_MODE: external
  N8N_RUNNERS_BROKER_LISTEN_ADDRESS: 0.0.0.0
  N8N_RUNNERS_AUTH_TOKEN: your-secret-here
  N8N_NATIVE_PYTHON_RUNNER: true

x-runner-common-env: &runner-common-env
  N8N_RUNNERS_AUTH_TOKEN: your-secret-here
  N8N_RUNNERS_STDLIB_ALLOW: "*"
  N8N_RUNNERS_EXTERNAL_ALLOW: "*"

services:
  postgres:
    image: postgres:16
    container_name: n8n-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: n8n
      POSTGRES_PASSWORD: your-db-password
      POSTGRES_DB: n8n
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n -d n8n"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: n8n-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  n8n-main:
    image: n8nio/n8n:2.14.2
    container_name: n8n-main
    restart: unless-stopped
    environment:
      <<: *n8n-common-env
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  task-runner-main:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: n8n-runner-main
    restart: unless-stopped
    environment:
      <<: *runner-common-env
      N8N_RUNNERS_TASK_BROKER_URI: http://n8n-main:5679
    depends_on:
      - n8n-main

  n8n-worker:
    image: n8nio/n8n:2.14.2
    container_name: n8n-worker
    restart: unless-stopped
    command: worker --concurrency=10
    environment:
      <<: *n8n-common-env
      QUEUE_HEALTH_CHECK_ACTIVE: true
      QUEUE_HEALTH_CHECK_PORT: 5680
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  task-runner-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: n8n-runner-worker
    restart: unless-stopped
    environment:
      <<: *runner-common-env
      N8N_RUNNERS_TASK_BROKER_URI: http://n8n-worker:5679
    depends_on:
      - n8n-worker

  n8n-webhook:
    image: n8nio/n8n:2.14.2
    container_name: n8n-webhook
    restart: unless-stopped
    command: webhook
    environment:
      <<: *n8n-common-env
    ports:
      - "5677:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  n8n_data:
  postgres_data:
  redis_data: