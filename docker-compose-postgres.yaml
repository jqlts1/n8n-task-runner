services:
  postgres:
    image: postgres:16-alpine
    container_name: n8n-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=n8n
      - POSTGRES_PASSWORD=n8n-pg-password-change-me
      - POSTGRES_DB=n8n
      - TZ=Asia/Shanghai
    volumes:
      # bind mount 到本地，备份/迁移直接打包这个目录即可
      - ./data/postgres:/var/lib/postgresql/data

  n8n:
    image: n8nio/n8n:2.19.2
    container_name: n8n-main
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      # ---- 数据库切到 postgres ----
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=n8n-pg-password-change-me

      # ---- task-runner（n8n 2.x 关键，保持不动） ----
      - N8N_RUNNERS_ENABLED=true
      - N8N_RUNNERS_MODE=external
      - N8N_RUNNERS_BROKER_LISTEN_ADDRESS=0.0.0.0
      - N8N_RUNNERS_AUTH_TOKEN=your-secret-here
      - N8N_NATIVE_PYTHON_RUNNER=true

      # ---- 其它通用 ----
      - N8N_DEFAULT_BINARY_DATA_MODE=filesystem
      - N8N_SECURE_COOKIE=false
      - GENERIC_TIMEZONE=Asia/Shanghai
      - TZ=Asia/Shanghai
      - WEBHOOK_URL=http://worker.zhangte.org:5678/
    ports:
      - "5678:5678"
    volumes:
      # 工作流元数据/凭证加密 key/二进制文件等都在这里，必须备份
      - ./data/n8n:/home/node/.n8n

  task-runner:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: n8n-runner
    restart: unless-stopped
    environment:
      - N8N_RUNNERS_TASK_BROKER_URI=http://n8n-main:5679
      - N8N_RUNNERS_AUTH_TOKEN=your-secret-here
      - N8N_RUNNERS_STDLIB_ALLOW=*
      - N8N_RUNNERS_EXTERNAL_ALLOW=*
      - TZ=Asia/Shanghai
    depends_on:
      - n8n
