services:
  postgres:
    image: postgres:16-alpine
    container_name: n8n-postgres
    restart: unless-stopped
    network_mode: host
    environment:
      - POSTGRES_USER=n8n
      - POSTGRES_PASSWORD=n8n-pg-password-change-me
      - POSTGRES_DB=n8n
      - TZ=Asia/Shanghai
    volumes:
      # bind mount 到本地，备份/迁移直接打包这个目录即可
      - ./data/postgres:/var/lib/postgresql/data

  n8n:
    image: n8nio/n8n:2.19.2
    container_name: n8n-main
    restart: unless-stopped
    network_mode: host
    depends_on:
      - postgres
    environment:
      # ---- 数据库切到 postgres（host 网络下，走 127.0.0.1） ----
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=127.0.0.1
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=n8n-pg-password-change-me

      # ---- task-runner（n8n 2.x 关键，保持不动） ----
      - N8N_RUNNERS_ENABLED=true
      - N8N_RUNNERS_MODE=external
      - N8N_RUNNERS_BROKER_LISTEN_ADDRESS=127.0.0.1
      - N8N_RUNNERS_AUTH_TOKEN=your-secret-here
      - N8N_NATIVE_PYTHON_RUNNER=true

      # ---- 内部监听：只绑回环口，由 Caddy 反代 ----
      - N8N_LISTEN_ADDRESS=127.0.0.1
      - N8N_PORT=5681

      # ---- 公网访问相关（HTTPS via Caddy） ----
      - N8N_HOST=worker.zhangte.org
      - N8N_PROTOCOL=https
      - N8N_EDITOR_BASE_URL=https://worker.zhangte.org:5678/
      - N8N_PROXY_HOPS=1
      - WEBHOOK_URL=https://worker.zhangte.org:5678/

      # ---- 其它通用 ----
      - N8N_DEFAULT_BINARY_DATA_MODE=filesystem
      - N8N_SECURE_COOKIE=false
      - GENERIC_TIMEZONE=Asia/Shanghai
      - TZ=Asia/Shanghai
    volumes:
      # 工作流元数据/凭证加密 key/二进制文件等都在这里，必须备份
      - ./data/n8n:/home/node/.n8n

  caddy:
    # 内置 Cloudflare DNS 插件的 Caddy 镜像，用于 DNS-01 challenge 自动签证书
    image: slothcroissant/caddy-cloudflaredns:latest
    container_name: caddy
    restart: unless-stopped
    network_mode: host
    environment:
      # CF API Token 通过 .env 文件注入（见 .env.example）
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./data/caddy:/data
      - ./data/caddy-config:/config
    depends_on:
      - n8n

  task-runner:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: n8n-runner
    restart: unless-stopped
    network_mode: host
    environment:
      # host 网络下，task-runner 通过 127.0.0.1 连 n8n 的 broker
      - N8N_RUNNERS_TASK_BROKER_URI=http://127.0.0.1:5679
      - N8N_RUNNERS_AUTH_TOKEN=your-secret-here
      - N8N_RUNNERS_STDLIB_ALLOW=*
      - N8N_RUNNERS_EXTERNAL_ALLOW=*
      - TZ=Asia/Shanghai
    depends_on:
      - n8n
